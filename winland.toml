# Winland configuration.
#
# This file is the built-in default config with commented examples for every
# supported Phase 7 section. Uncomment and edit examples as needed, then run:
#   cargo run -p winland-cli -- config validate --path winland.toml

# Window rules are evaluated in order. Later matching rules override earlier
# action fields, so put broad rules first and specific exceptions later.
window_rules = []

# Example rule:
# [[window_rules]]
# name = "float settings"
# [window_rules.match]
# title = { contains = "Settings" }
# process_name = "SystemSettings.exe"
# [window_rules.action]
# float = true
# workspace = 2
# always_on_workspace = false

# Example rule:
# [[window_rules]]
# name = "ignore desktop helpers"
# [window_rules.match]
# class = { suffix = "ToolWindow" }
# executable_path = { contains = "\\AppData\\Local\\" }
# [window_rules.action]
# manage = false
# mode = "ignore"

[general]
# One of: trace, debug, info, warn, error, off.
log_level = "info"

[hotkeys]
# Advanced interception is the custom-shell default because Win-key shortcuts
# such as Win+Arrow are usually owned by Windows in normal RegisterHotKey mode.
mode = "advanced-interception"

# In advanced-interception mode, this hotkey is never intercepted. Keep it as a
# recovery path if a suppressing binding is bad.
panic_hotkey = "Ctrl+Alt+Shift+P"

# Hook decisions over this budget are logged. Command execution is dispatched
# outside the hook callback.
override_latency_budget_micros = 250

# Keep game and fullscreen input out of override logic by default.
bypass = { fullscreen = true, class = [], executable_path = [], process_name = [] }
# Example:
# bypass = { fullscreen = true, process_name = ["eldenring.exe", "cs2.exe"] }

# Hold these modifiers and left-drag anywhere inside a normal top-level window
# to move it without grabbing the title bar.
modifier_drag = { enabled = true, modifiers = "Win" }

# Supported command names:
# focus-left, focus-down, focus-up, focus-right
# focus-monitor next, focus-monitor prev, focus-monitor 1
# swap-left, swap-down, swap-up, swap-right
# retile, toggle-float, reload, quit
# switch-workspace-N, switch-workspace N, switch-workspace next, switch-workspace prev
# move-to-workspace-N, move-window-to-workspace N
# move-window-to-workspace-and-follow N
# move-window-to-monitor next, move-window-to-monitor prev, move-window-to-monitor 1
# send-workspace-to-monitor WORKSPACE MONITOR
# Bindings may set either command = "..." for Winland actions or launch = "..."
# for an app command line.
bindings = [
  { keys = "Win+T", launch = "wt.exe", override_app = true },
  { keys = "Win+Left", command = "focus-left", override_app = true },
  { keys = "Win+Down", command = "focus-down", override_app = true },
  { keys = "Win+Up", command = "focus-up", override_app = true },
  { keys = "Win+Right", command = "focus-right", override_app = true },
  { keys = "Win+Shift+Left", command = "swap-left", override_app = true },
  { keys = "Win+Shift+Down", command = "swap-down", override_app = true },
  { keys = "Win+Shift+Up", command = "swap-up", override_app = true },
  { keys = "Win+Shift+Right", command = "swap-right", override_app = true },
  { keys = "Win+R", command = "retile", override_app = true },
  { keys = "Win+F", command = "toggle-float", override_app = true },
  { keys = "Win+C", command = "reload", override_app = true },
  { keys = "Win+Q", command = "quit", override_app = true },
  { keys = "Win+1", command = "switch-workspace-1", override_app = true },
  { keys = "Win+2", command = "switch-workspace-2", override_app = true },
  { keys = "Win+3", command = "switch-workspace-3", override_app = true },
  { keys = "Win+4", command = "switch-workspace-4", override_app = true },
  { keys = "Win+5", command = "switch-workspace-5", override_app = true },
  { keys = "Win+6", command = "switch-workspace-6", override_app = true },
  { keys = "Win+7", command = "switch-workspace-7", override_app = true },
  { keys = "Win+8", command = "switch-workspace-8", override_app = true },
  { keys = "Win+9", command = "switch-workspace-9", override_app = true },
  { keys = "Win+Shift+1", command = "move-to-workspace-1", override_app = true },
  { keys = "Win+Shift+2", command = "move-to-workspace-2", override_app = true },
  { keys = "Win+Shift+3", command = "move-to-workspace-3", override_app = true },
  { keys = "Win+Shift+4", command = "move-to-workspace-4", override_app = true },
  { keys = "Win+Shift+5", command = "move-to-workspace-5", override_app = true },
  { keys = "Win+Shift+6", command = "move-to-workspace-6", override_app = true },
  { keys = "Win+Shift+7", command = "move-to-workspace-7", override_app = true },
  { keys = "Win+Shift+8", command = "move-to-workspace-8", override_app = true },
  { keys = "Win+Shift+9", command = "move-to-workspace-9", override_app = true },
]

# Example alternate binding:
# bindings = [
#   { keys = "Win+H", command = "focus-left", override_app = true },
#   { keys = "Win+Shift+H", command = "swap-left" },
#   { keys = "Win+R", command = "retile" },
#   { keys = "Win+T", launch = "wt.exe" },
# ]

[layout]
# Supported layouts: master-stack, dwindle, vertical-stack, horizontal-stack.
default = "dwindle"

# Geometry options are applied to tiling calculations.
gap = 0
border = 0
master_ratio_percent = 50

# Dwindle-only options. Smart split uses the cursor position inside the
# split target and also preserves existing split directions.
smart_split = false
preserve_split = false

[layout.per_monitor]
# Use `winland monitors` to list monitor IDs. The special key `primary` is
# also supported.
# primary = { layout = "dwindle", gap = 8, border = 1, smart_split = true }
# "0x10001" = { layout = "vertical-stack", gap = 6 }
primary = { layout = "dwindle", gap = 8, border = 1, smart_split = true }

[layout.per_workspace]
# Example workspace-specific overrides.
# "1" = { layout = "master-stack", gap = 6, master_ratio_percent = 55 }
# "2" = { layout = "horizontal-stack", gap = 12, border = 1 }

[workspaces]
count = 9

# Optional display names. The list cannot be longer than count.
names = []
# names = ["main", "web", "chat", "code", "docs", "media", "vm", "scratch", "misc"]

# Optional initial monitor assignment by workspace number.
initial_monitor = {}
# initial_monitor = { "1" = "primary", "2" = "secondary" }

# One of: keep-current, first.
startup = "keep-current"

[behavior]
# Retile existing manageable windows when the daemon starts.
startup_retile = true

# Retile after event bursts that change manageable window participation or monitor placement.
dynamic_retile = true

# Temporarily release tiled windows while the user drags or resizes them.
drag_to_float = true

# Reabsorb temporarily floating windows into the tiled layout when drag/resize ends.
retile_on_drag_end = true

# Reserved for behavior policy. Kept explicit so config can grow without
# changing the shape users already edit.
focus_follows_mouse = false

# Preserve previous placement when switching fake workspaces.
restore_previous_placement = true

# Minimized windows are skipped by default to avoid fighting applications.
manage_minimized_windows = false

# Fullscreen windows are avoided by default.
avoid_fullscreen_windows = true

[borders]
# Lightweight Win32 overlay borders. Disabled by default while tiling behavior
# is still stabilizing; set enabled = true for focus/floating feedback.
enabled = false
width = 3
active_color = "#5AA9FF"
inactive_color = "#3A3A3A"
floating_color = "#FFB454"
show_inactive = true
disable_when_fullscreen = true

[game_mode]
# Back off when a focused game or fullscreen/borderless window is detected.
# See docs/game-mode.md for detection rules, monitor-only pause, and diagnostics.
enabled = true
pause_on_fullscreen = true
pause_all_layouts_when_game_focused = true
pause_focused_monitor_only = false
disable_borders = true
disable_animations = true
disable_keyboard_hooks = true
fullscreen_tolerance_px = 4

# Executable-name matches are case-insensitive and apply to the process name,
# not the full path. Both lists make Winland ignore the window and activate
# game mode when it is focused.
ignored_exes = []
game_exes = []
# Example:
# game_exes = ["eldenring.exe", "cs2.exe"]
